<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
</head>
<body>

    <textarea id="comment"></textarea>

    <div>
        Count: <span id="count1">0</span>/100
    </div>

    <div>
        Remaining chars: <span id="count2">100</span>
    </div>

    <script>
        var box = document.querySelector('#comment');

        box.onkeydown = function () {
            var text = box.value;
            var count = text.length;

            // var counter1 = document.querySelector('#count1');
            // counter1.innerText = count;
            document.querySelector('#count1'). innerText = box.value.length

            var counter2 = document.querySelector('#count2');
            counter2.innerText = 100 - count;
        };
    </script>

</body>
</html>
